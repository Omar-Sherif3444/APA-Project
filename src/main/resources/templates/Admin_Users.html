<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Users</title>
  <link rel="stylesheet" th:href="@{/bootstrap.min.css}">
  <link rel="shortcut icon" th:href="@{/images/FullLogo_Transparent.png}" type="image/x-icon">
  <style>
    body {
        background: #0f0f1a;
        color: white;
        font-family: Arial, sans-serif;
    }
    .container {
        max-width: 900px;
        margin: 50px auto;
    }
    h1 {
        color: #C22D7B;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: #1a1a2e;
        border-radius: 12px;
        overflow: hidden;
    }
    th, td {
        padding: 12px 15px;
        text-align: left;
    }
    th {
        background: #C22D7B;
        color: white;
    }
    tr:nth-child(even) {
        background: rgba(255,255,255,0.03);
    }
    .delete-btn {
        background: #ff4444;
        color: white;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
    }
    .delete-btn:hover {
        background: #cc0000;
    }
    .back-link {
        display: inline-block;
        margin-top: 25px;
        color: #C22D7B;
        text-decoration: none;
        font-weight: 700;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>All Users</h1>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>First Name</th>
      <th>Last Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
      <td th:text="${user.id}"></td>
      <td th:text="${user.firstName}"></td>
      <td th:text="${user.lastName}"></td>
      <td th:text="${user.email}"></td>
      <td th:text="${user.phone}"></td>
      <td>
        <a class="delete-btn" th:href="@{/admin/users/delete/{id}(id=${user.id})}"
           onclick="return confirm('Delete this user? This cannot be undone.')">
          Delete
        </a>
      </td>
    </tr>
    </tbody>
  </table>

  <a class="back-link" th:href="@{/admin/dashboard}">← Back to Dashboard</a>
</div>
</body>
</html>
