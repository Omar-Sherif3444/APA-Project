<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<link rel="shortcut icon"
href="../images/FullLogo_Transparent.png"
type="image/x-icon">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f1a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:900px;
    max-width:100%;
    display:flex;
    gap:20px;
}

/* =========================
   PAYMENT BOX
========================= */

.payment-box{
    flex:2;
    background:#1a1a2e;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.payment-box h2{
    margin-bottom:20px;
    font-size:24px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    color:#bbb;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    background:#0f0f1a;
    color:white;
    transition:0.3s;
}

.input-group input:focus{
    border:1px solid #ff2e63;
}

.input-group input.error{
    border:2px solid #ff2e63;
    background:#2a1a1a;
}

.error-message{
    color:#ff2e63;
    font-size:12px;
    margin-top:5px;
    display:none;
}

.row{
    display:flex;
    gap:12px;
}

button{
    width:100%;
    padding:13px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ff2e63;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e02656;
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

/* =========================
   SUMMARY
========================= */

.summary{
    flex:1;
    background:#16213e;
    padding:25px;
    border-radius:12px;
    height:fit-content;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.summary h2{
    margin-bottom:20px;
}

.summary p{
    margin-bottom:12px;
    color:#ccc;
    font-size:14px;
}

.seats{
    color:#ffcc00;
}

.total{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:white;
}

.loading-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
    flex-direction:column;
}

.loading-spinner{
    width:50px;
    height:50px;
    border:4px solid #ff2e63;
    border-top-color:transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:15px;
}

.loading-text{
    color:white;
    font-size:16px;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

    .container{
        flex-direction:column;
    }

}

</style>
</head>

<body>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Processing Payment...</div>
</div>

<form class="container" id="paymentForm" action="/confirm-payment" method="post">

    <!-- PAYMENT -->
    <div class="payment-box">

        <h2>💳 Payment Details</h2>

        <div class="input-group">
            <label>Card Holder Name</label>
            <input
                type="text"
                id="cardHolder"
                name="cardHolder"
                placeholder="John Doe">
            <div class="error-message" id="cardHolderError">Please enter a valid card holder name</div>
        </div>

        <div class="input-group">
            <label>Card Number</label>
            <input
                type="text"
                id="cardNumber"
                name="cardNumber"
                placeholder="1234 5678 9012 3456"
                maxlength="19">
            <div class="error-message" id="cardNumberError">Please enter a valid 16-digit card number</div>
        </div>

        <div class="row">

            <div class="input-group">
                <label>Expiry</label>
                <input
                    type="text"
                    id="expiry"
                    name="expiry"
                    placeholder="MM/YY"
                    maxlength="5">
                <div class="error-message" id="expiryError">Please enter a valid expiry date (MM/YY)</div>
            </div>

            <div class="input-group">
                <label>CVV</label>
                <input
                    type="password"
                    id="cvv"
                    name="cvv"
                    placeholder="123"
                    maxlength="4">
                <div class="error-message" id="cvvError">Please enter a valid CVV (3-4 digits)</div>
            </div>

        </div>

        <button id="payBtn" type="submit">
            Confirm Payment
        </button>

    </div>

    <!-- SUMMARY -->
    <div class="summary">

        <h2>🎬 Booking Summary</h2>

        <input type="hidden"
               name="showId"
               th:value="${bookingRequest.showId}">

        <input type="hidden"
               name="movieTitle"
               th:value="${bookingRequest.movieTitle}">

        <input type="hidden"
               name="showDate"
               th:value="${bookingRequest.showDate}">

        <input type="hidden"
               name="showTime"
               th:value="${bookingRequest.showTime}">

        <input type="hidden"
               name="totalPrice"
               id="totalPriceHidden"
               th:value="${bookingRequest.totalPrice}">

        <div th:each="seatId : ${bookingRequest.seatIds}">
            <input type="hidden"
                   name="seatIds"
                   th:value="${seatId}">
        </div>

        <p>
            <strong>Movie:</strong>
            <span class="movie"
                  th:text="${bookingRequest.movieTitle}">
            </span>
        </p>

        <p>
            <strong>Date:</strong>
            <span class="date"
                  th:text="${bookingRequest.showDate}">
            </span>
        </p>

        <p>
            <strong>Time:</strong>
            <span class="time"
                  th:text="${bookingRequest.showTime}">
            </span>
        </p>

        <p>
            <strong>Seats:</strong>
            <span class="seats"
                  th:text="${bookingRequest.seatIds}">
            </span>
        </p>

        <p class="total"
           th:text="${bookingRequest.totalPrice + ' EGP'}">
        </p>

    </div>

</form>

<script>
    // Get form elements
    const paymentForm = document.getElementById('paymentForm');
    const payBtn = document.getElementById('payBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    // Input fields
    const cardHolderInput = document.getElementById('cardHolder');
    const cardNumberInput = document.getElementById('cardNumber');
    const expiryInput = document.getElementById('expiry');
    const cvvInput = document.getElementById('cvv');
    
    // Error message elements
    const cardHolderError = document.getElementById('cardHolderError');
    const cardNumberError = document.getElementById('cardNumberError');
    const expiryError = document.getElementById('expiryError');
    const cvvError = document.getElementById('cvvError');
    
    // Helper function to remove error styling
    function removeError(input, errorElement) {
        input.classList.remove('error');
        if (errorElement) {
            errorElement.style.display = 'none';
        }
    }
    
    // Helper function to add error styling
    function addError(input, errorElement) {
        input.classList.add('error');
        if (errorElement) {
            errorElement.style.display = 'block';
        }
    }
    
    // Validate Card Holder Name (at least 2 words, letters and spaces only)
    function validateCardHolder() {
        const value = cardHolderInput.value.trim();
        const nameRegex = /^[A-Za-z\s]{2,}$/;
        
        if (value === '') {
            addError(cardHolderInput, cardHolderError);
            return false;
        }
        
        if (!nameRegex.test(value)) {
            addError(cardHolderInput, cardHolderError);
            return false;
        }
        
        removeError(cardHolderInput, cardHolderError);
        return true;
    }
    
    // Validate Card Number (16 digits, with or without spaces)
    function validateCardNumber() {
        let value = cardNumberInput.value.trim();
        // Remove spaces for validation
        const cleanValue = value.replace(/\s/g, '');
        const cardRegex = /^\d{16}$/;
        
        if (cleanValue === '') {
            addError(cardNumberInput, cardNumberError);
            return false;
        }
        
        if (!cardRegex.test(cleanValue)) {
            addError(cardNumberInput, cardNumberError);
            return false;
        }
        
        
        
        removeError(cardNumberInput, cardNumberError);
        cardNumberError.textContent = 'Please enter a valid 16-digit card number';
        return true;
    }
    
    // Luhn Algorithm for card validation
  
    
    // Auto-format card number with spaces
    function formatCardNumber() {
        let value = cardNumberInput.value.replace(/\s/g, '');
        if (value.length > 16) {
            value = value.slice(0, 16);
        }
        
        // Add space every 4 digits
        let formatted = '';
        for (let i = 0; i < value.length; i++) {
            if (i > 0 && i % 4 === 0) {
                formatted += ' ';
            }
            formatted += value[i];
        }
        
        cardNumberInput.value = formatted;
    }
    
    // Validate Expiry Date (MM/YY)
    function validateExpiry() {
        let value = expiryInput.value.trim();
        const expiryRegex = /^(0[1-9]|1[0-2])\/([0-9]{2})$/;
        
        if (value === '') {
            addError(expiryInput, expiryError);
            return false;
        }
        
        if (!expiryRegex.test(value)) {
            addError(expiryInput, expiryError);
            return false;
        }
        
        // Check if card is expired
        const [month, year] = value.split('/');
        const currentDate = new Date();
        const currentYear = currentDate.getFullYear() % 100;
        const currentMonth = currentDate.getMonth() + 1;
        
        const expYear = parseInt(year, 10);
        const expMonth = parseInt(month, 10);
        
        if (expYear < currentYear || (expYear === currentYear && expMonth < currentMonth)) {
            addError(expiryInput, expiryError);
            expiryError.textContent = 'Card has expired';
            expiryError.style.display = 'block';
            return false;
        }
        
        removeError(expiryInput, expiryError);
        expiryError.textContent = 'Please enter a valid expiry date (MM/YY)';
        return true;
    }
    
    // Auto-format expiry date
    function formatExpiry() {
        let value = expiryInput.value.replace(/\//g, '');
        if (value.length > 4) {
            value = value.slice(0, 4);
        }
        
        if (value.length >= 2) {
            const month = value.slice(0, 2);
            if (parseInt(month) > 12) {
                expiryInput.value = '12';
                return;
            }
            if (value.length >= 3) {
                value = month + '/' + value.slice(2);
            }
        }
        
        expiryInput.value = value;
    }
    
    // Validate CVV (3-4 digits)
    function validateCVV() {
        const value = cvvInput.value.trim();
        const cvvRegex = /^\d{3,4}$/;
        
        if (value === '') {
            addError(cvvInput, cvvError);
            return false;
        }
        
        if (!cvvRegex.test(value)) {
            addError(cvvInput, cvvError);
            return false;
        }
        
        removeError(cvvInput, cvvError);
        return true;
    }
    
    // Real-time validation
    cardHolderInput.addEventListener('input', validateCardHolder);
    cardHolderInput.addEventListener('blur', validateCardHolder);
    
    cardNumberInput.addEventListener('input', function() {
        formatCardNumber();
        validateCardNumber();
    });
    cardNumberInput.addEventListener('blur', validateCardNumber);
    
    expiryInput.addEventListener('input', function() {
        formatExpiry();
        validateExpiry();
    });
    expiryInput.addEventListener('blur', validateExpiry);
    
    cvvInput.addEventListener('input', validateCVV);
    cvvInput.addEventListener('blur', validateCVV);
    
    // Validate all fields
    function validateAllFields() {
        const isValidCardHolder = validateCardHolder();
        const isValidCardNumber = validateCardNumber();
        const isValidExpiry = validateExpiry();
        const isValidCVV = validateCVV();
        
        return isValidCardHolder && isValidCardNumber && isValidExpiry && isValidCVV;
    }
    
    // Handle form submission
    paymentForm.addEventListener('submit', function(event) {
        // Validate all fields before submission
        if (!validateAllFields()) {
            event.preventDefault();
            return false;
        }
        
        // Show loading overlay
        loadingOverlay.style.display = 'flex';
        
        // Disable submit button to prevent multiple submissions
        payBtn.disabled = true;
        payBtn.textContent = 'Processing...';
        
        // Get the form data
        const formData = new FormData(paymentForm);
        
        // Submit the form via fetch for better control
        event.preventDefault();
        
        fetch('/confirm-payment', {
            method: 'POST',
            body: formData
        })
        .then(response => {
            if (response.redirected) {
                // Follow the redirect
                window.location.href = response.url;
            } else {
                return response.text();
            }
        })
        .then(html => {
            if (html && html.includes('<!DOCTYPE')) {
                // Check if we got an error page or checkout page back
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const errorElement = doc.querySelector('.error-message');
                
                if (errorElement && errorElement.textContent) {
                    // Show error message
                    alert(errorElement.textContent);
                    loadingOverlay.style.display = 'none';
                    payBtn.disabled = false;
                    payBtn.textContent = 'Confirm Payment';
                } else if (doc.querySelector('.payment-box')) {
                    // We're back on checkout page with error
                    loadingOverlay.style.display = 'none';
                    payBtn.disabled = false;
                    payBtn.textContent = 'Confirm Payment';
                    alert('Payment failed. Please check your details and try again.');
                } else {
                    // Redirect to ticket page - try to extract booking ID
                    const bookingLink = doc.querySelector('a[href*="/Ticket/"]');
                    if (bookingLink) {
                        window.location.href = bookingLink.href;
                    } else {
                        loadingOverlay.style.display = 'none';
                        payBtn.disabled = false;
                        payBtn.textContent = 'Confirm Payment';
                        alert('Something went wrong. Please try again.');
                    }
                }
            }
        })
        .catch(error => {
            console.error('Error:', error);
            loadingOverlay.style.display = 'none';
            payBtn.disabled = false;
            payBtn.textContent = 'Confirm Payment';
            alert('An error occurred. Please try again.');
        });
        
        return false;
    });
    
    // Prevent form submission on enter key in certain fields
    const inputs = [cardHolderInput, cardNumberInput, expiryInput, cvvInput];
    inputs.forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (validateAllFields()) {
                    paymentForm.dispatchEvent(new Event('submit'));
                }
            }
        });
    });
</script>

</body>
</html>
