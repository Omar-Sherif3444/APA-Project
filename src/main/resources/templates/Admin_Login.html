<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" th:href="@{/bootstrap.min.css}">
    <link rel="shortcut icon" th:href="@{/images/FullLogo_Transparent.png}" type="image/x-icon">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0f1a;
        }
        .login-box {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #C22D7B;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            background: #0f0f1a;
            color: white;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #C22D7B;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .login-box button:hover {
            background: #a02863;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Admin Login</h2>

    <div th:if="${error}" style="color: #ff6b6b; background: rgba(255,0,0,0.1);
                    padding: 12px; border-radius: 8px; margin-bottom: 15px;
                    border: 1px solid #ff6b6b; text-align: center;">
        <p th:text="${error}" style="margin: 0;"></p>
    </div>

    <form th:action="@{/admin/login}" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
